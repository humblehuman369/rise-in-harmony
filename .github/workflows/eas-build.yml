name: EAS Mobile Build (Expo)

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options: [ios, android, all]
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

jobs:
  eas-build:
    name: EAS Build — ${{ github.event.inputs.platform || 'all' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Expo CLI & EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Install mobile dependencies
        working-directory: ./mobile
        run: pnpm install --frozen-lockfile

      - name: Build with EAS
        working-directory: ./mobile
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build --platform $PLATFORM --profile $PROFILE --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  eas-submit:
    name: EAS Submit to Stores
    runs-on: ubuntu-latest
    needs: eas-build
    if: github.event.inputs.profile == 'production'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Submit to App Store & Play Store
        working-directory: ./mobile
        run: eas submit --platform ${{ github.event.inputs.platform || 'all' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
